<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Open Graph (Facebook, LinkedIn, etc.) -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Your Title">
    <meta property="og:description" content="Your Description">
    <meta property="og:url" content="Your URL">
    <meta property="og:image" content="social-preview-image.png">

    <!-- X Card -->
    <meta name="twitter:card" content="Social Preview Image">
    <meta name="twitter:title" content="Your Title">
    <meta name="twitter:description" content="Your Description">
    <meta name="twitter:image" content="social-preview-image.png">

    <!-- One favicon (ICO works everywhere) -->
    <link rel="icon" href="favicon.png">

    <!-- One Apple Touch Icon (iOS home screen) -->
    <link rel="apple-touch-icon" href="images/apple-touch-icon.png">

    <link rel="stylesheet" href="prove.css">
    <title>Recipes</title>
</head>

<body>
    <header>
        <img id="logo" src="recipe-book.png" alt="site logo">
    <h1 class="siteTitle"> Recipe Book</h1>
    </header>
    <input type="search" id="search" placeholder="Find a recipe">

    <div class="hLine"></div>

    <div class="recipe-card">
        <img class="recipe-img" src="images/apple_crisp.jpg" alt="picture of dessert">
        <div class="recipe-info">
            <button class="recipe-tag">dessert</button>
            <h2 class="recipe-title">Apple Crisp</h2>
            <span class="rating" role="img" aria-label="Rating: 4 out of 5 stars">
                <span aria-hidden="true" class="icon-star">⭐</span>
                <span aria-hidden="true" class="icon-star">⭐</span>
                <span aria-hidden="true" class="icon-star">⭐</span>
                <span aria-hidden="true" class="icon-star">⭐</span>
                <span aria-hidden="true" class="icon-star-empty">☆</span>
            </span>
            <p class="description">Lorem ipsum dolor sit amet, consectetur adipisicing elit. Quia enim tempora soluta voluptates, facere distinctio in. Odio tenetur magnam, assumenda ad, ullam, itaque tempore mollitia labore ducimus neque ab facere.</p>
        </div>
    </div>
</body>

<footer>

    
    <div class="social">
        <a href="#"><img src="images/instagram_icon.svg" alt="instagram icon"></a>
        <a href="#"><img src="images/youtube_icon.svg" alt="youtube icon"></a>
        <a href="#"><img src="images/pinterest_icon.svg" alt="pinterest icon"></a>
    </div>
    <a href="https://www.flaticon.com/free-icons/recipe" title="recipe icons">Recipe icons created by Freepik -
        Flaticon</a>

</footer>

</html>
